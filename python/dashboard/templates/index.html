<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>agent-manager dashboard</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --border: #2a2e38; --text: #e6e8eb; --muted: #8a90a0;
    --accent: #5b9dff; --ok: #4caf7d; --warn: #e0a940; --bad: #e0575c;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, Segoe UI, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }
  header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  header .pipeline-dir { color: var(--muted); font-size: 12px; }
  .layout { display: flex; }
  nav { width: 200px; padding: 16px 0; border-right: 1px solid var(--border); min-height: calc(100vh - 53px); }
  nav button { display: flex; justify-content: space-between; width: 100%; padding: 10px 20px; background: none; border: none; color: var(--text); text-align: left; cursor: pointer; font-size: 13px; }
  nav button:hover { background: var(--panel); }
  nav button.active { background: var(--panel); border-left: 3px solid var(--accent); color: var(--accent); }
  nav .count { color: var(--muted); font-variant-numeric: tabular-nums; }
  main { flex: 1; padding: 20px; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 8px 10px; color: var(--muted); font-weight: 500; font-size: 12px; border-bottom: 1px solid var(--border); }
  td { padding: 9px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
  tr.clickable { cursor: pointer; }
  tr.clickable:hover td { background: var(--panel); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .badge.ok { background: rgba(76,175,125,.15); color: var(--ok); }
  .badge.warn { background: rgba(224,169,64,.15); color: var(--warn); }
  .badge.bad { background: rgba(224,87,92,.15); color: var(--bad); }
  .badge.idle { background: rgba(138,144,160,.15); color: var(--muted); }
  .badge-col { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
  .stale-timer { color: var(--bad); font-size: 11px; font-variant-numeric: tabular-nums; }
  .worker-card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; }
  .worker-card .row { display: flex; justify-content: space-between; align-items: center; }
  .worker-card .id { font-weight: 600; }
  .worker-card .meta { color: var(--muted); font-size: 12px; margin-top: 6px; }
  .empty { color: var(--muted); padding: 30px; text-align: center; }
  th.sortable { cursor: pointer; user-select: none; }
  th.sortable:hover { color: var(--text); }
  tr.top-row td:first-child { border-left: 2px solid var(--ok); }
  .bar-track { height: 4px; background: var(--border); border-radius: 2px; margin-top: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 2px; }
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: none; align-items: flex-start; justify-content: center; padding: 40px 20px; overflow-y: auto; }
  .modal-backdrop.open { display: flex; }
  .modal { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 20px 24px; max-width: 900px; width: 100%; }
  .modal h2 { margin-top: 0; font-size: 15px; }
  .modal pre { white-space: pre-wrap; word-break: break-word; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 12px; font-size: 12px; max-height: 400px; overflow-y: auto; }
  .modal .close { float: right; cursor: pointer; color: var(--muted); background: none; border: none; font-size: 18px; }
  .field-label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .04em; margin-top: 14px; }
  .path-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .path-row input { flex: 1; background: var(--panel); border: 1px solid var(--border); color: var(--text); padding: 8px 10px; border-radius: 6px; font-family: monospace; font-size: 13px; }
  button.action { background: var(--accent); color: #0b1220; border: none; padding: 8px 16px; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 13px; }
  button.action:disabled { opacity: .5; cursor: not-allowed; }
  button.secondary { background: var(--panel); color: var(--text); border: 1px solid var(--border); padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .browser-panel { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 16px; max-height: 300px; overflow-y: auto; }
  .browser-crumb { color: var(--muted); font-size: 12px; margin-bottom: 8px; word-break: break-all; }
  .browser-entry { display: flex; justify-content: space-between; align-items: center; padding: 6px 8px; border-radius: 4px; cursor: pointer; }
  .browser-entry:hover { background: var(--bg); }
  .browser-entry .git-badge { font-size: 10px; color: var(--ok); border: 1px solid var(--ok); padding: 1px 6px; border-radius: 8px; }
  .stat-row { display: flex; gap: 24px; margin: 14px 0; }
  .stat { color: var(--muted); font-size: 12px; }
  .stat strong { color: var(--text); font-size: 16px; display: block; }
  .build-log { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; font-family: monospace; font-size: 12px; max-height: 180px; overflow-y: auto; margin-top: 10px; }
  .build-log div { color: var(--muted); }
  iframe.viz { width: 100%; flex: 1; min-height: 0; border: 1px solid var(--border); border-radius: 8px; margin-top: 16px; }
</style>
</head>
<body>
<header>
  <h1>agent-manager</h1>
  <span class="pipeline-dir" id="pipeline-status">loading...</span>
</header>
<div class="layout">
  <nav id="nav"></nav>
  <main id="main"><div class="empty">Loading...</div></main>
</div>

<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal" id="modal-content"></div>
</div>

<script>
const TABS = [
  { key: 'project', label: 'Project' },
  { key: 'workers', label: 'Workers' },
  { key: 'models', label: 'Models' },
  { key: 'drafting', label: 'Drafting' },
  { key: 'pending', label: 'Pending' },
  { key: 'review', label: 'Review' },
  { key: 'approved', label: 'Approved' },
  { key: 'blocked', label: 'Blocked' },
  { key: 'done', label: 'Done' },
];
let activeTab = 'project';
let counts = {};

// Project tab state -- kept separate from the generic 5s poll-and-rerender cycle used by
// every other tab, since re-rendering over a user's in-progress folder navigation every
// 5s would be a bad experience. See renderProject()/enterProjectTab()/leaveProjectTab().
let projectPath = localStorage.getItem('agentManagerProjectPath') || '';
let grepDirs = localStorage.getItem('agentManagerGrepDirs') || '';
let browsePath = '';
let browserOpen = false;
let projectStatusInterval = null;

async function fetchJson(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(url + ' -> ' + r.status);
  return r.json();
}

function renderNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = '';
  for (const tab of TABS) {
    const btn = document.createElement('button');
    btn.className = tab.key === activeTab ? 'active' : '';
    const count = (tab.key === 'workers' || tab.key === 'models') ? '' : (counts[tab.key] ?? '');
    btn.innerHTML = `<span>${tab.label}</span><span class="count">${count}</span>`;
    btn.onclick = () => {
      if (activeTab === 'project' && tab.key !== 'project') leaveProjectTab();
      activeTab = tab.key;
      renderNav();
      if (tab.key === 'project') enterProjectTab(); else renderMain();
    };
    nav.appendChild(btn);
  }
}

function fmtAge(sec) {
  if (sec == null) return '?';
  if (sec < 60) return sec + 's';
  if (sec < 3600) return Math.round(sec / 60) + 'm';
  return Math.round(sec / 3600) + 'h';
}

function statusBadgeClass(status, stale) {
  if (stale) return 'bad';
  if (status === 'working' || status === 'checking') return 'ok';
  if (status === 'idle') return 'idle';
  return 'warn';
}

async function renderWorkers() {
  const instances = await fetchJson('/api/instances');
  const main = document.getElementById('main');
  instancesForTimers = instances;
  if (instances.length === 0) { main.innerHTML = '<div class="empty">No instances found -- is the pipeline running?</div>'; return; }
  main.innerHTML = instances.map(inst => `
    <div class="worker-card">
      <div class="row">
        <span class="id">${inst.instanceId}</span>
        <div class="badge-col">
          <span class="badge ${statusBadgeClass(inst.status, inst.stale)}">${inst.stale ? 'STALE' : inst.status}</span>
          ${inst.stale ? `<span class="stale-timer" id="stale-timer-${inst.instanceId}"></span>` : ''}
        </div>
      </div>
      <div class="meta">
        pid ${inst.pid} · model ${inst.model || '-'} · heartbeat ${fmtAge(inst.heartbeatAgeSeconds)} ago
        ${inst.currentTaskId ? ' · working on <strong>' + inst.currentTaskId + '</strong>' + (inst.currentPass ? ' (' + inst.currentPass + ')' : '') : ''}
      </div>
    </div>
  `).join('');
  updateStaleTimers();
}

// Raw instance list from the last /api/instances fetch, kept around so the 1s ticking
// timer below can recompute stale duration client-side without re-polling every second.
let instancesForTimers = [];

function fmtDuration(sec) {
  sec = Math.max(0, Math.floor(sec));
  const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
  if (h > 0) return `${h}h ${m}m ${s}s`;
  return `${m}m ${s}s`;
}

// Ticks every second independent of the 5s /api/instances poll, so "stale for" reads as a
// live counter instead of jumping in 5s increments. Computed purely from lastHeartbeat +
// staleThresholdSeconds (both already on each instance) -- no extra fetch needed.
function updateStaleTimers() {
  for (const inst of instancesForTimers) {
    if (!inst.stale) continue;
    const el = document.getElementById('stale-timer-' + inst.instanceId);
    if (!el) continue;
    const staleSinceMs = new Date(inst.lastHeartbeat).getTime() + inst.staleThresholdSeconds * 1000;
    el.textContent = 'Stale for ' + fmtDuration((Date.now() - staleSinceMs) / 1000);
  }
}
setInterval(updateStaleTimers, 1000);

function fmtPct(x) { return x == null ? '-' : Math.round(x * 100) + '%'; }
function fmtNum(x, digits) { return x == null ? '-' : Number(x).toFixed(digits); }

// Sort state lives outside the function so it survives the 5s poll re-rendering the
// whole table from scratch each time (same rebuild-from-fetch pattern renderQueueTab uses).
let modelsSortKey = 'approveRate';
let modelsSortDir = 'desc';

const MODELS_COLUMNS = [
  { key: 'model', label: 'Model', sortable: false },
  { key: 'callCount', label: 'Calls', sortable: true },
  { key: 'approveRate', label: 'Approve Rate', sortable: true, bar: 'ok' },
  { key: 'avgTokensPerSec', label: 'Avg Tok/s', sortable: true, bar: 'accent' },
  { key: 'minTokensPerSec', label: 'Low Tok/s', sortable: true },
  { key: 'maxTokensPerSec', label: 'High Tok/s', sortable: true },
  { key: 'avgLatencyMs', label: 'Avg Latency (ms)', sortable: true },
  { key: 'degenerateCount', label: 'Degenerate', sortable: true },
  { key: 'errorCount', label: 'Errors', sortable: true },
];

function renderBarCell(value, max, colorVar, fmt) {
  const label = fmt(value);
  if (value == null || !max) return label;
  const pct = Math.max(0, Math.min(100, (value / max) * 100));
  return `<div>${label}</div><div class="bar-track"><div class="bar-fill" style="width:${pct.toFixed(1)}%; background:var(--${colorVar})"></div></div>`;
}

async function renderModelsTab() {
  const models = await fetchJson('/api/models');
  const main = document.getElementById('main');
  if (models.length === 0) { main.innerHTML = '<div class="empty">No model-call stats yet -- set ORNITH_AB_MODELS to compare candidates on the implement pass.</div>'; return; }

  const sorted = models.slice().sort((a, b) => {
    const av = a[modelsSortKey], bv = b[modelsSortKey];
    if (av == null && bv == null) return 0;
    if (av == null) return 1;   // nulls last regardless of direction
    if (bv == null) return -1;
    if (av < bv) return modelsSortDir === 'asc' ? -1 : 1;
    if (av > bv) return modelsSortDir === 'asc' ? 1 : -1;
    return 0;
  });

  const maxApprove = Math.max(...models.map(m => m.approveRate ?? 0));
  const maxTokS = Math.max(...models.map(m => m.avgTokensPerSec ?? 0));

  const headCells = MODELS_COLUMNS.map(col => {
    if (!col.sortable) return `<th>${col.label}</th>`;
    const arrow = modelsSortKey === col.key ? (modelsSortDir === 'asc' ? ' ▲' : ' ▼') : '';
    return `<th class="sortable" data-key="${col.key}">${col.label}${arrow}</th>`;
  }).join('');

  const rows = sorted.map((m, i) => `
    <tr class="${i === 0 ? 'top-row' : ''}">
      <td>${m.model}</td>
      <td>${m.callCount}</td>
      <td>${renderBarCell(m.approveRate, maxApprove, 'ok', fmtPct)}</td>
      <td>${renderBarCell(m.avgTokensPerSec, maxTokS, 'accent', (v) => fmtNum(v, 1))}</td>
      <td>${fmtNum(m.minTokensPerSec, 1)}</td>
      <td>${fmtNum(m.maxTokensPerSec, 1)}</td>
      <td>${fmtNum(m.avgLatencyMs, 0)}</td>
      <td>${m.degenerateCount}</td>
      <td>${m.errorCount}</td>
    </tr>
  `).join('');

  main.innerHTML = `<table><thead><tr>${headCells}</tr></thead><tbody>${rows}</tbody></table>`;
  main.querySelectorAll('th.sortable').forEach(th => {
    th.onclick = () => {
      const key = th.dataset.key;
      modelsSortDir = (modelsSortKey === key && modelsSortDir === 'desc') ? 'asc' : 'desc';
      modelsSortKey = key;
      renderModelsTab();
    };
  });
}

async function renderQueueTab(state) {
  const tasks = await fetchJson('/api/queue/' + state);
  const main = document.getElementById('main');
  if (tasks.length === 0) { main.innerHTML = '<div class="empty">Nothing here.</div>'; return; }
  const rows = tasks.map(t => `
    <tr class="clickable" data-id="${t.id}" data-state="${state}">
      <td>${t.id}</td>
      <td>${t.title || ''}</td>
      <td>${t.domain || ''}/${t.source || ''}</td>
      <td>${t.blockedReason ? '<span style="color:var(--bad)">' + escapeHtml(t.blockedReason).slice(0, 80) + '</span>' : (t.branch || t.doneMarker || '')}</td>
    </tr>
  `).join('');
  main.innerHTML = `<table><thead><tr><th>ID</th><th>Title</th><th>Domain/Source</th><th>Detail</th></tr></thead><tbody>${rows}</tbody></table>`;
  main.querySelectorAll('tr.clickable').forEach(row => {
    row.onclick = () => openDetail(row.dataset.state, row.dataset.id);
  });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function openDetail(state, id) {
  const task = await fetchJson(`/api/task/${state}/${encodeURIComponent(id)}`);
  const backdrop = document.getElementById('modal-backdrop');
  const content = document.getElementById('modal-content');
  let html = `<button class="close" onclick="closeDetail()">&times;</button><h2>${task.id}</h2>`;
  html += `<div><strong>${escapeHtml(task.title || '')}</strong></div>`;
  html += `<div class="field-label">Domain / Source</div><div>${task.domain || ''} / ${task.source || ''}</div>`;
  if (task.blockedReason) html += `<div class="field-label">Blocked Reason</div><div style="color:var(--bad)">${escapeHtml(task.blockedReason)}</div>`;
  if (task.branch) html += `<div class="field-label">Branch</div><div>${task.branch}</div>`;
  if (task.planResponse) html += `<div class="field-label">Plan</div><pre>${escapeHtml(task.planResponse)}</pre>`;
  if (task.implementResponse) html += `<div class="field-label">Implement</div><pre>${escapeHtml(task.implementResponse)}</pre>`;
  content.innerHTML = html;
  backdrop.classList.add('open');
}
function closeDetail() { document.getElementById('modal-backdrop').classList.remove('open'); }
document.getElementById('modal-backdrop').addEventListener('click', (e) => { if (e.target.id === 'modal-backdrop') closeDetail(); });

async function renderMain() {
  try {
    if (activeTab === 'workers') await renderWorkers();
    else if (activeTab === 'models') await renderModelsTab();
    else await renderQueueTab(activeTab);
  } catch (e) {
    document.getElementById('main').innerHTML = `<div class="empty">Error loading data: ${e.message}</div>`;
  }
}

async function refresh() {
  try {
    counts = await fetchJson('/api/summary');
    document.getElementById('pipeline-status').textContent = 'connected';
  } catch (e) {
    document.getElementById('pipeline-status').textContent = 'disconnected';
  }
  renderNav();
  // Project tab manages its own rendering (enterProjectTab/leaveProjectTab) so a user's
  // in-progress folder browsing isn't wiped out by this generic 5s cycle -- only the nav
  // badge counts above still update while it's open.
  if (activeTab !== 'project') renderMain();
}

// --- Project tab --------------------------------------------------------------------

function escapeAttr(s) { return String(s).replace(/"/g, '&quot;'); }

async function enterProjectTab() {
  const main = document.getElementById('main');
  main.innerHTML = `
    <div style="display:flex;flex-direction:column;height:calc(100vh - 93px);">
      <div class="path-row">
        <input id="project-path-input" type="text" placeholder="C:\\path\\to\\your\\project" value="${escapeAttr(projectPath)}">
        <button class="secondary" id="browse-toggle">Browse...</button>
        <button class="action" id="build-btn">Build Graph</button>
      </div>
      <div class="path-row">
        <input id="project-grepdirs-input" type="text" placeholder="src, frontend/src, backend/src (optional -- comma-separated, leave blank to scan the whole path)" value="${escapeAttr(grepDirs)}">
      </div>
      <div id="browser-panel" class="browser-panel" style="display:none"></div>
      <div id="pipeline-panel" class="worker-card"></div>
      <div id="project-status-area" style="flex:1;min-height:0;display:flex;flex-direction:column;"></div>
    </div>
  `;
  lastRenderedStatusKey = null;  // fresh tab entry -- force the first poll to actually render
  document.getElementById('project-path-input').addEventListener('change', (e) => {
    projectPath = e.target.value.trim();
    localStorage.setItem('agentManagerProjectPath', projectPath);
    lastRenderedStatusKey = null;  // switched projects -- old key would wrongly suppress the new render
    refreshProjectStatus();
  });
  document.getElementById('browse-toggle').onclick = () => {
    browserOpen = !browserOpen;
    document.getElementById('browser-panel').style.display = browserOpen ? 'block' : 'none';
    if (browserOpen) { browsePath = projectPath || ''; loadBrowsePanel(); }
  };
  document.getElementById('project-grepdirs-input').addEventListener('change', (e) => {
    grepDirs = e.target.value.trim();
    localStorage.setItem('agentManagerGrepDirs', grepDirs);
  });
  document.getElementById('build-btn').onclick = triggerBuild;

  await refreshPipelineStatus();
  await refreshProjectStatus();
  projectStatusInterval = setInterval(() => { refreshPipelineStatus(); refreshProjectStatus(); }, 3000);
}

function leaveProjectTab() {
  if (projectStatusInterval) { clearInterval(projectStatusInterval); projectStatusInterval = null; }
}

async function refreshPipelineStatus() {
  const panel = document.getElementById('pipeline-panel');
  if (!panel) return;
  let status;
  try {
    status = await fetchJson('/api/pipeline/status');
  } catch (e) {
    panel.innerHTML = `<div class="row"><span>Could not check pipeline status: ${e.message}</span></div>`;
    return;
  }

  if (status.running) {
    panel.innerHTML = `
      <div class="row">
        <span>Live pipeline running against <strong>${escapeHtml(status.activeRepoRoot || '?')}</strong></span>
        <span class="badge ok">RUNNING</span>
      </div>
      <div class="meta"><button class="secondary" id="stop-pipeline-btn" style="margin-top:8px">Stop Pipeline</button></div>
    `;
    document.getElementById('stop-pipeline-btn').onclick = stopPipeline;
  } else if (status.activeRepoRoot) {
    panel.innerHTML = `
      <div class="row">
        <span>Last configured project: <strong>${escapeHtml(status.activeRepoRoot)}</strong></span>
        <span class="badge idle">NOT RUNNING</span>
      </div>
      <div class="meta">Browse to a folder above (or reuse this one) and click Start Pipeline.</div>
    `;
  } else {
    panel.innerHTML = `<div class="row"><span>No project configured yet.</span><span class="badge idle">IDLE</span></div>`;
  }

  // "Start Pipeline" lives next to the path input itself, not in this panel, since it
  // acts on whatever's currently in the input -- only show/enable it when nothing is
  // already running and a path is actually entered.
  let startBtn = document.getElementById('start-pipeline-btn');
  if (!startBtn) {
    startBtn = document.createElement('button');
    startBtn.id = 'start-pipeline-btn';
    startBtn.className = 'action';
    startBtn.textContent = 'Start Pipeline';
    startBtn.onclick = startPipeline;
    document.querySelector('.path-row').appendChild(startBtn);
  }
  startBtn.disabled = status.running || !projectPath;
}

async function startPipeline() {
  if (!projectPath) return;
  const btn = document.getElementById('start-pipeline-btn');
  btn.disabled = true;
  btn.textContent = 'Starting...';
  try {
    const res = await fetch('/api/pipeline/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path: projectPath }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.reason || data.description || res.statusText);
  } catch (e) {
    alert('Could not start pipeline: ' + e.message);
  }
  btn.textContent = 'Start Pipeline';
  await refreshPipelineStatus();
}

async function stopPipeline() {
  const btn = document.getElementById('stop-pipeline-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Stopping...'; }
  try {
    await fetch('/api/pipeline/stop', { method: 'POST' });
  } catch (e) {
    alert('Could not stop pipeline: ' + e.message);
  }
  await refreshPipelineStatus();
}

async function loadBrowsePanel() {
  const panel = document.getElementById('browser-panel');
  if (!panel) return;
  panel.innerHTML = '<div class="empty">Loading...</div>';
  try {
    const data = await fetchJson('/api/browse?path=' + encodeURIComponent(browsePath));
    let html = `<div class="browser-crumb">${data.path || 'Drives'}</div>`;
    if (data.parent) {
      html += `<div class="browser-entry" data-nav="${escapeAttr(data.parent)}"><span>.. (up)</span></div>`;
    }
    if (data.path) {
      html += `<div class="browser-entry" data-select="${escapeAttr(data.path)}" style="border-top:1px solid var(--border);margin-top:4px;padding-top:8px">
        <span><strong>Use this folder</strong></span><span>&rarr;</span></div>`;
    }
    for (const entry of data.entries) {
      html += `<div class="browser-entry" data-nav="${escapeAttr(entry.path)}">
        <span>${escapeHtml(entry.name)}</span>
        ${entry.isGitRepo ? '<span class="git-badge">git</span>' : ''}
      </div>`;
    }
    panel.innerHTML = html;
    panel.querySelectorAll('[data-nav]').forEach(el => {
      el.onclick = () => { browsePath = el.dataset.nav; loadBrowsePanel(); };
    });
    panel.querySelectorAll('[data-select]').forEach(el => {
      el.onclick = () => {
        projectPath = el.dataset.select;
        localStorage.setItem('agentManagerProjectPath', projectPath);
        document.getElementById('project-path-input').value = projectPath;
        lastRenderedStatusKey = null;  // switched projects -- old key would wrongly suppress the new render
        browserOpen = false;
        panel.style.display = 'none';
        refreshProjectStatus();
      };
    });
  } catch (e) {
    panel.innerHTML = `<div class="empty">Could not browse this path: ${e.message}</div>`;
  }
}

// Set to whatever "key" the currently-rendered #project-status-area content corresponds
// to -- refreshProjectStatus() is polled every 3s, but overwriting innerHTML unconditionally
// destroys and recreates the <iframe> even when its src is byte-identical, which restarts
// pyvis's force-directed layout simulation from scratch every single poll (confirmed live:
// looked exactly like "the graph keeps rebuilding" even though no build was actually
// running). Only touch the DOM when what SHOULD be shown has actually changed.
let lastRenderedStatusKey = null;

async function refreshProjectStatus() {
  const area = document.getElementById('project-status-area');
  const buildBtn = document.getElementById('build-btn');
  if (!area) return;
  if (!projectPath) {
    if (lastRenderedStatusKey !== 'no-path') {
      area.innerHTML = '<div class="empty">Enter or browse to a project path above to get started.</div>';
      lastRenderedStatusKey = 'no-path';
    }
    if (buildBtn) buildBtn.disabled = true;
    return;
  }

  let status;
  try {
    status = await fetchJson('/api/project/status?path=' + encodeURIComponent(projectPath) + '&grepDirs=' + encodeURIComponent(grepDirs));
  } catch (e) {
    if (lastRenderedStatusKey !== 'fetch-error') {
      area.innerHTML = `<div class="empty">${e.message}</div>`;
      lastRenderedStatusKey = 'fetch-error';
    }
    return;
  }

  if (buildBtn) buildBtn.disabled = status.build.running;

  // Building: the log genuinely needs to update every poll, but this branch never
  // contains an iframe, so unconditional re-render here is harmless.
  if (status.build.running) {
    area.innerHTML = '<div class="stat-row"><div class="stat"><strong>Building...</strong></div></div>'
      + '<div class="build-log">' + status.build.log.map(l => `<div>${escapeHtml(l)}</div>`).join('') + '</div>';
    lastRenderedStatusKey = 'building';
    return;
  }

  const key = status.build.error ? ('error:' + status.build.error)
    : status.graphExists ? ('graph:' + status.builtAt)
    : 'no-graph';
  if (key === lastRenderedStatusKey) return;  // nothing actually changed -- leave the iframe alone
  lastRenderedStatusKey = key;

  let html = '';
  if (status.build.error) {
    html = `<div class="stat-row"><div class="stat" style="color:var(--bad)"><strong>Build failed</strong>${escapeHtml(status.build.error)}</div></div>`;
  } else if (status.graphExists) {
    html = `
      <div class="stat-row">
        <div class="stat"><strong>${status.fileCount}</strong>files</div>
        <div class="stat"><strong>${status.communityCount}</strong>communities</div>
        <div class="stat"><strong>${status.builtAt ? new Date(status.builtAt).toLocaleString() : '?'}</strong>last built</div>
      </div>
      <iframe class="viz" src="/project/visualization?path=${encodeURIComponent(projectPath)}&grepDirs=${encodeURIComponent(grepDirs)}"></iframe>
    `;
  } else {
    html = '<div class="empty">No graph built yet for this project -- click Build Graph above.</div>';
  }
  area.innerHTML = html;
}

async function triggerBuild() {
  if (!projectPath) return;
  const buildBtn = document.getElementById('build-btn');
  buildBtn.disabled = true;
  try {
    const body = { path: projectPath };
    const dirs = grepDirs.split(',').map(d => d.trim()).filter(Boolean);
    if (dirs.length) body.grepDirs = dirs;
    const res = await fetch('/api/project/build', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.description || res.statusText);
    await refreshProjectStatus();
  } catch (e) {
    const area = document.getElementById('project-status-area');
    area.innerHTML = `<div class="empty">Could not start build: ${e.message}</div>`;
    buildBtn.disabled = false;
  }
}

refresh();  // always -- populates counts + renders nav regardless of which tab is active
if (activeTab === 'project') enterProjectTab();
setInterval(refresh, 5000);

// The graph iframe's CSS box resizes correctly on window resize (flex:1 fills whatever
// space main's own flex-column layout gives it), but a box change caused by the OUTER
// page's layout doesn't reliably fire a 'resize' event -- or wake vis-network's own
// autoResize -- inside the iframe's own window (confirmed: neither fired in testing).
// The top-level window always gets a real resize event, so push the new size into the
// iframe's network directly from here instead of relying on the iframe to notice on its
// own.
window.addEventListener('resize', () => {
  const iframe = document.querySelector('iframe.viz');
  const net = iframe && iframe.contentWindow && iframe.contentWindow.network;
  if (!net) return;
  const rect = iframe.getBoundingClientRect();
  net.setSize(rect.width + 'px', rect.height + 'px');
  net.redraw();
});
</script>
</body>
</html>
